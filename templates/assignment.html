<!DOCTYPE html>
<html>
<head>
    <title>Drone Assignment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Drone Assignment</h2>

<form action="/add_assignment" method="POST">

<input type="text" 
name="drone_name" 
placeholder="Drone Name" required>

<input type="text" 
name="disaster_type" 
placeholder="Disaster Type" required>

<input type="text" 
name="location" 
placeholder="Location" required>

<input type="text" 
name="status" 
placeholder="Status" required>


<button type="submit">
Assign Drone
</button>

</form>


<br>


<table border="1" cellpadding="10">

<tr>
<th>ID</th>
<th>Drone</th>
<th>Disaster</th>
<th>Location</th>
<th>Status</th>
</tr>


{% for a in assignments %}

<tr>

<td>{{ a[0] }}</td>
<td>{{ a[1] }}</td>
<td>{{ a[2] }}</td>
<td>{{ a[3] }}</td>
<td>{{ a[4] }}</td>

</tr>

{% endfor %}


</table>


</body>
</html>
