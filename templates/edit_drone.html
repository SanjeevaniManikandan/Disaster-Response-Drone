<!DOCTYPE html>
<html>
<head>
    <title>Edit Drone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Edit Drone</h1>

<form action="/update_drone" method="POST">

    <input type="hidden" name="id" value="{{ drone[0] }}">

    <label>Drone Name:</label>
    <input type="text" name="drone_name" value="{{ drone[1] }}">
    <br><br>

    <label>Model:</label>
    <input type="text" name="model" value="{{ drone[2] }}">
    <br><br>

    <label>Status:</label>
    <input type="text" name="status" value="{{ drone[3] }}">
    <br><br>

    <label>Battery:</label>
    <input type="text" name="battery" value="{{ drone[4] }}">
    <br><br>

    <button type="submit">Update Drone</button>

</form>

</body>
</html>
