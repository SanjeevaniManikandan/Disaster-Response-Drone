<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:blue;
            color:white;
            border:none;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<form action="/register" method="POST">

<input type="text"
name="fullname"
placeholder="Full Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<br>

Already have an account?

<a href="/login">Login</a>

</div>

</body>
</html>
