<!DOCTYPE html>
<html>
<head>
    <title>Rescue Team Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Rescue Team Management</h2>

<form action="/add_rescue" method="POST">

    <input type="text" name="team_name" placeholder="Team Name" required>

    <input type="text" name="leader" placeholder="Leader Name" required>

    <input type="text" name="contact" placeholder="Contact Number" required>

    <input type="text" name="location" placeholder="Location" required>

    <button type="submit">Add Team</button>

</form>

<br>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Team Name</th>
    <th>Leader</th>
    <th>Contact</th>
    <th>Location</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for team in teams %}
<tr>
    <td>{{ team[0] }}</td>
    <td>{{ team[1] }}</td>
    <td>{{ team[2] }}</td>
    <td>{{ team[3] }}</td>
    <td>{{ team[4] }}</td>
    <td>
    <a href="/edit_rescue/{{ team[0] }}">
        <button>Edit</button>
    </a>
</td>
<td>
    <a href="/delete_rescue/{{ team[0] }}"
       onclick="return confirm('Are you sure you want to delete this rescue team?')">
        <button>Delete</button>
    </a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
