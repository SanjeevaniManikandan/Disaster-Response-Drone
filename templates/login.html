<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<form action="/login" method="POST">

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<br>

Don't have an account?

<a href="/">Register</a>

</div>

</body>

</html>
